services:
  - type: web
    name: scadenziario-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_SECRET
        value: ke-group-secret-changeme-in-production
      - key: LOGIN_USERNAME
        value: admin
      - key: LOGIN_PASSWORD
        value: kegroup2024
      - key: DATABASE_URL
        fromDatabase:
          name: scadenziario-db
          property: connectionString

databases:
  - name: scadenziario-db
    plan: free
    postgresSQLVersion: "15"
